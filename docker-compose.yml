version: '3.8'

services:
  robo:
    build: .
    container_name: robo_tareffa
    restart: unless-stopped
    environment:
      # Preencha suas credenciais do Tareffa diretamente no painel do Coolify 
      # na aba Environment Variables (estas aqui são apenas de exemplo)
      - TAREFFA_USER=miguel@scalcomt.com.br
      - TAREFFA_PASS=Scalco123
      - TZ=America/Cuiaba
    volumes:
      - volume_sistemas_v2:/sv-scalco/Sistemas
      - volume_trabalho_v2:/sv-scalco/Trabalho

volumes:
  volume_sistemas_v2:
    driver_opts:
      type: cifs
      o: "username=micro11,password=micro14,vers=2.0,dir_mode=0777,file_mode=0777,uid=0,gid=0,noperm"
      device: "//192.168.1.195/Sistemas"

  volume_trabalho_v2:
    driver_opts:
      type: cifs
      o: "username=micro11,password=micro14,vers=2.0,dir_mode=0777,file_mode=0777,uid=0,gid=0,noperm"
      device: "//192.168.1.195/Trabalho"
